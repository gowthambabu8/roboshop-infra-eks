apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: roboshop
data:
  RABBITMQ_DEFAULT_USER: cm9ib3Nob3A=
  RABBITMQ_DEFAULT_PASS: cm9ib3Nob3AxMjM=
---
apiVersion: v1
kind: Service
metadata: 
  name: rabbitmq-headless
  namespace: roboshop
  labels: 
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  clusterIP: None
  selector:
    project: roboshop
    tier: db
    component: rabbitmq
  ports:
    - protocol: TCP
      port: 5672 # service port
      targetPort: 5672 # container port

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: roboshop
  labels: 
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: rabbitmq
  serviceName: "rabbitmq-headless"
  replicas: "1"
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: happielearning/rabbitmq:7
          envFrom:
            - secretRef:
                name: rabbitmq-secret
          volumeMounts:
            - name: rabbitmq
              mountPath: /var/lib/rabbitmq
  # Volume Cliam
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "roboshop-ebs"
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata: 
  name: rabbitmq
  namespace: roboshop
  labels: 
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  selector:
    project: roboshop
    tier: db
    component: rabbitmq
  ports:
    - protocol: TCP
      port: 5672 # service port
      targetPort: 5672 # container port